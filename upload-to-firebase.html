<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Upload to Firebase — Lush Beauty Mart</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;max-width:580px;margin:50px auto;padding:20px;background:#f9f0ec}
.box{background:#fff;padding:32px;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.1)}
h2{color:#1c1410;font-size:22px;margin-bottom:8px}
p{color:#8a6a5a;font-size:13px;margin-bottom:20px;line-height:1.6}
.status{padding:14px 16px;border-radius:6px;margin:16px 0;font-size:14px;line-height:1.6}
.ok{background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7}
.err{background:#ffebee;color:#c62828;border:1px solid #ef9a9a}
.info{background:#e3f2fd;color:#1565c0;border:1px solid #90caf9}
.bar{height:10px;background:#f0e6da;border-radius:5px;margin:12px 0;overflow:hidden}
.fill{height:100%;background:#c9506a;border-radius:5px;transition:width .4s;width:0}
button{background:#c9506a;color:#fff;border:none;padding:14px;border-radius:6px;font-size:15px;font-weight:600;cursor:pointer;width:100%;margin-top:8px;transition:.2s}
button:hover{background:#b03d57}
button:disabled{opacity:.5;cursor:not-allowed}
.log{font-size:12.5px;color:#666;margin-top:12px;line-height:1.9}
</style>
</head>
<body>
<div class="box">
  <h2>🔥 Upload Products to Firebase</h2>
  <p>Uploads all products to Firebase as ONE document (fast, 3-5 seconds). Every browser will then see the same data. <strong>Run once only.</strong></p>
  <div class="status info" id="st">Ready — click the button below.</div>
  <div class="bar"><div class="fill" id="fill"></div></div>
  <button onclick="go()" id="btn">🔥 Upload Products to Firebase Now</button>
  <div class="log" id="log"></div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
const db = getFirestore(initializeApp({
  apiKey:"AIzaSyC0ewsoKyf1bnsN1eW9j4DMObKPO9EECgo",
  authDomain:"lush-beauty-mart.firebaseapp.com",
  projectId:"lush-beauty-mart",
  storageBucket:"lush-beauty-mart.firebasestorage.app",
  messagingSenderId:"48725359774",
  appId:"1:48725359774:web:0e243059e6f0f2542c0f8f"
}));
function st(msg,cls){const e=document.getElementById("st");e.innerHTML=msg;e.className="status "+cls;}
function log(msg){document.getElementById("log").innerHTML+="<div>"+msg+"</div>";}
function prog(p){document.getElementById("fill").style.width=p+"%";}
window.go=async function(){
  const btn=document.getElementById("btn");
  btn.disabled=true; btn.textContent="⏳ Uploading...";
  try {
    st("⏳ Loading products.json...","info"); prog(15);
    const res=await fetch("products.json");
    if(!res.ok) throw new Error("Cannot load products.json");
    const data=await res.json();
    if(!Array.isArray(data)||!data.length) throw new Error("products.json is empty");
    const kb=Math.round(JSON.stringify(data).length/1024);
    log("✅ Found <strong>"+data.length+"</strong> products ("+kb+" KB)");
    prog(40);
    st("⏳ Saving to Firebase...","info");
    log("☁️ Writing to Firestore...");
    await setDoc(doc(db,"store","products"),{list:data});
    prog(100);
    st("✅ <strong>Done! "+data.length+" products uploaded.</strong><br>All browsers worldwide will now load from Firebase. You can close this page.","ok");
    log("🌍 Store syncs across all browsers. Hidden products hidden everywhere.");
    btn.textContent="✅ Complete!";
  } catch(e) {
    st("❌ "+e.message,"err");
    log("Error: "+e.message);
    btn.disabled=false; btn.textContent="🔄 Try Again"; prog(0);
  }
};
</script>
</body>
</html>
